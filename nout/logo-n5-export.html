<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOUT — Logo N°5</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: #0A0F2C;
      padding: 48px 64px;
      border-radius: 24px;
    }
    .logo-word {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 80px;
      letter-spacing: 0.22em;
      color: white;
      line-height: 1;
    }
    .logo-accent {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00C4B4;
    }
    .logo-974 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.32em;
      color: #00C4B4;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo" id="logo">
    <span class="logo-word">NOUT</span>
    <div class="logo-accent">
      <div class="logo-dot"></div>
      <span class="logo-974">La Réunion 974</span>
      <div class="logo-dot"></div>
    </div>
  </div>
</body>
</html>
