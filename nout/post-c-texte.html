<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NOUT — Post C</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; }
.frame {
  width:1080px; height:1080px;
  background:#0A0F2C;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:48px;
}
canvas { position:absolute; top:0; left:0; width:1080px; height:1080px; }
.bg-logo {
  position:absolute; font-family:'Montserrat',sans-serif; font-weight:900;
  font-size:360px; letter-spacing:0.15em; color:rgba(255,255,255,0.04);
  top:50%; left:50%; transform:translate(-50%,-50%); white-space:nowrap; user-select:none;
}
.words { display:flex; flex-direction:column; align-items:center; gap:16px; z-index:1; }
.word {
  font-family:'Montserrat',sans-serif; font-weight:900; font-size:110px; line-height:1; color:white;
  opacity:0; transform:translateX(-50px);
  animation:slideRight 0.65s cubic-bezier(0.16,1,0.3,1) forwards;
}
.word.w1 { animation-delay:0.4s; }
.word.w2 { animation-delay:1.3s; color:#00C4B4; }
.word.w3 { animation-delay:2.2s; font-size:60px; color:rgba(255,255,255,0.85); }
.sep { width:56px; height:3px; background:linear-gradient(90deg,#00C4B4,#1A3A8F); border-radius:2px; opacity:0; animation:fadeIn 0.5s ease forwards; }
.sep.s1 { animation-delay:1.1s; } .sep.s2 { animation-delay:2.0s; }
.tagline { display:flex; align-items:center; gap:14px; z-index:1; opacity:0; animation:fadeIn 0.8s ease forwards; animation-delay:3.2s; }
.dot { width:9px; height:9px; border-radius:50%; background:#00C4B4; }
.sub { font-family:'Montserrat',sans-serif; font-weight:600; font-size:16px; letter-spacing:0.32em; color:#00C4B4; text-transform:uppercase; }
@keyframes slideRight { to { opacity:1; transform:translateX(0); } }
@keyframes fadeIn     { to { opacity:1; } }
</style>
</head>
<body>
<div class="frame">
  <canvas id="c"></canvas>
  <div class="bg-logo">NOUT</div>
  <div class="words">
    <span class="word w1">Achète.</span>
    <div class="sep s1"></div>
    <span class="word w2">Vends.</span>
    <div class="sep s2"></div>
    <span class="word w3">Entre réunionnais.</span>
  </div>
  <div class="tagline"><div class="dot"></div><span class="sub">nout.re · La Réunion 974</span><div class="dot"></div></div>
</div>
<script>
const c=document.getElementById('c'); c.width=1080; c.height=1080;
const ctx=c.getContext('2d');
const pts=Array.from({length:50},()=>({x:Math.random()*1080,y:Math.random()*1080,r:Math.random()*1.5+0.4,o:Math.random(),s:Math.random()*0.006+0.002,t:Math.random()>0.7}));
function draw(){ ctx.clearRect(0,0,1080,1080); pts.forEach(p=>{ p.o+=p.s; if(p.o>1||p.o<0)p.s*=-1; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=p.t?`rgba(0,196,180,${p.o*0.45})`:`rgba(255,255,255,${p.o*0.35})`; ctx.fill(); }); requestAnimationFrame(draw); }
draw();
</script>
</body>
</html>
