<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NOUT — Post A</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; }
.frame {
  width:1080px; height:1080px;
  background:#0A0F2C;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;
}
canvas { position:absolute; top:0; left:0; width:1080px; height:1080px; }
.logo { display:flex; flex-direction:column; align-items:center; gap:24px; z-index:1; }
.letters { display:flex; }
.letter {
  font-family:'Montserrat',sans-serif; font-weight:900;
  font-size:200px; color:white; line-height:1; letter-spacing:0.1em;
  opacity:0; transform:translateY(70px);
  animation:slideUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
}
.letter:nth-child(1){ animation-delay:0.4s; }
.letter:nth-child(2){ animation-delay:0.6s; }
.letter:nth-child(3){ animation-delay:0.8s; }
.letter:nth-child(4){ animation-delay:1.0s; }
.line { width:0; height:3px; background:linear-gradient(90deg,transparent,#00C4B4,transparent); animation:expandLine 0.9s ease forwards; animation-delay:1.5s; }
.tagline { display:flex; align-items:center; gap:14px; opacity:0; animation:fadeIn 0.8s ease forwards; animation-delay:1.8s; }
.dot { width:9px; height:9px; border-radius:50%; background:#00C4B4; }
.sub { font-family:'Montserrat',sans-serif; font-weight:600; font-size:20px; letter-spacing:0.36em; color:#00C4B4; text-transform:uppercase; }
@keyframes slideUp    { to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn     { to { opacity:1; } }
@keyframes expandLine { to { width:280px; } }
</style>
</head>
<body>
<div class="frame">
  <canvas id="c"></canvas>
  <div class="logo">
    <div class="letters">
      <span class="letter">N</span><span class="letter">O</span>
      <span class="letter">U</span><span class="letter">T</span>
    </div>
    <div class="line"></div>
    <div class="tagline"><div class="dot"></div><span class="sub">La Réunion 974</span><div class="dot"></div></div>
  </div>
</div>
<script>
const c=document.getElementById('c'); c.width=1080; c.height=1080;
const ctx=c.getContext('2d');
const stars=Array.from({length:80},()=>({x:Math.random()*1080,y:Math.random()*1080,r:Math.random()*1.8+0.3,o:Math.random(),s:Math.random()*0.007+0.002}));
function draw(){ ctx.clearRect(0,0,1080,1080); stars.forEach(s=>{ s.o+=s.s; if(s.o>1||s.o<0)s.s*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${s.o*0.55})`; ctx.fill(); }); requestAnimationFrame(draw); }
draw();
</script>
</body>
</html>
