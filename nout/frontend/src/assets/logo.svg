<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 48" fill="none" role="img" aria-label="NOUT">

  <!-- ── Soleil (icône) centré en (24,24) ── -->
  <g>
    <!-- 8 rayons dorés -->
    <g stroke="#E8A000" stroke-width="2.5" stroke-linecap="round">
      <line x1="24" y1="2"  x2="24" y2="8"  />
      <line x1="24" y1="2"  x2="24" y2="8"  transform="rotate(45  24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="8"  transform="rotate(90  24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="8"  transform="rotate(135 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="8"  transform="rotate(180 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="8"  transform="rotate(225 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="8"  transform="rotate(270 24 24)"/>
      <line x1="24" y1="2"  x2="24" y2="8"  transform="rotate(315 24 24)"/>
    </g>

    <!-- Disque doré -->
    <circle cx="24" cy="24" r="13" fill="#E8A000"/>

    <!-- N cacao (sombre sur fond doré = lisible) -->
    <rect x="14" y="14" width="5" height="20" rx="1" fill="#2C1A00"/>
    <rect x="29" y="14" width="5" height="20" rx="1" fill="#2C1A00"/>
    <polygon points="19,14 24,14 29,34 24,34" fill="#2C1A00"/>
  </g>

  <!-- ── Texte NOUT cacao ── -->
  <text
    x="56" y="33"
    font-family="Nunito, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="28"
    letter-spacing="1.5"
    fill="#2C1A00"
  >NOUT</text>

  <!-- Sous-texte 974 doré -->
  <text
    x="57" y="44"
    font-family="Inter, sans-serif"
    font-weight="600"
    font-size="9"
    letter-spacing="3"
    fill="#E8A000"
  >RÉUNION 974</text>

</svg>
