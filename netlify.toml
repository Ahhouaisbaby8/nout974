[build]
  base    = "nout/frontend"
  command = "npm run build"
  publish = "nout/frontend/dist"

[functions]
  directory    = "nout/frontend/netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
